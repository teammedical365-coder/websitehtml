<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://medical365.in/book-demo" />
    <link rel="stylesheet" href="global-styles.css?v=3.0">
    <link rel="stylesheet" href="redesign.css?v=1.0">
    <link rel="icon" type="image/jpeg" href="https://medical365.in/logo/medical365fav.jpg">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Demo - Medical365</title>
    <meta name="description" content="Book a personalized demo of Medical365, the leading hospital management system.">
    
    <style>
        :root {
            --form-bg: #ffffff;
            --input-border: #e2e8f0;
            --input-focus: #1A56DB;
            --text-placeholder: #94a3b8;
            --btn-blue: #1A56DB;
            --btn-blue-hover: #1e40af;
        }

        .book-demo-page {
            background: linear-gradient(135deg, #f8faff 0%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .demo-container {
            max-width: 700px;
            width: 100%;
            background: var(--form-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 48px;
        }

        .demo-form-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .demo-form-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .demo-form-header p {
            color: #64748b;
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            gap: 20px;
        }

        .form-row-full {
            grid-column: 1 / -1;
        }

        .form-row-split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row-split {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1e293b;
            transition: all 0.2s;
        }

        .form-control::placeholder {
            color: var(--text-placeholder);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }

        textarea.form-control {
            resize: none;
        }

        .privacy-check {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.875rem;
            color: #64748b;
            line-height: 1.4;
        }

        .privacy-check input {
            margin-top: 4px;
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            background: var(--btn-blue);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--btn-blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 86, 219, 0.25);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalScale {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .check-icon {
            width: 64px;
            height: 64px;
            background: #ecfdf5;
            color: #059669;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .modal-content h2 {
            font-size: 1.5rem;
            color: #1e293b;
            margin-bottom: 12px;
        }

        .modal-content p {
            color: #64748b;
            line-height: 1.6;
        }

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
            40% { color: #fff; text-shadow: .2em 0 0 rgba(0,0,0,0), .4em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .2em 0 0 #fff, .4em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .2em 0 0 #fff, .4em 0 0 #fff; }
        }
    </style>
</head>
<body>

    <header class="main-header redesign-nav" id="main-header">
        <div class="header-container">
            <a href="/" class="logo">
                <img src="/medical365logo1.png" alt="Medical365 Logo">
            </a>
            <div class="header-cta">
                <a href="/" class="btn-secondary" style="background:#f1f5f9; color:#475569; padding: 8px 16px; border-radius:6px; font-weight:600;">Back to Home</a>
            </div>
        </div>
    </header>

    <main class="book-demo-page">
        <div class="demo-container">
            <div class="demo-form-header">
                <h1>Book a Demo</h1>
                <p>Personalized walkthrough for your healthcare facility</p>
            </div>

            <form id="book-demo-form" action="https://formspree.io/f/teammedical365@gmail.com" method="POST">
                <div class="form-grid">
                    <!-- Row 1 -->
                    <div class="form-row-full">
                        <div class="form-group">
                            <label for="name">Full Name*</label>
                            <input type="text" id="name" name="Full Name" class="form-control" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="form-row-split">
                        <div class="form-group">
                            <label for="phone">Phone Number*</label>
                            <input type="tel" id="phone" name="Phone" class="form-control" placeholder="e.g. +91 9876543210" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address*</label>
                            <input type="email" id="email" name="Email" class="form-control" placeholder="you@hospital.com" required>
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="form-row-split">
                        <div class="form-group">
                            <label for="state">State*</label>
                            <select id="state" name="State" class="form-control" required>
                                <option value="" disabled selected>-- Select State --</option>
                                <option value="Rajasthan">Rajasthan</option>
                                <option value="Delhi">Delhi</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Karnataka">Karnataka</option>
                                <option value="Tamil Nadu">Tamil Nadu</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="city">City*</label>
                            <select id="city" name="City" class="form-control" required>
                                <option value="" disabled selected>-- Select City --</option>
                                <option value="Jaipur">Jaipur</option>
                                <option value="Jodhpur">Jodhpur</option>
                                <option value="Udaipur">Udaipur</option>
                                <option value="Kota">Kota</option>
                                <option value="Ajmer">Ajmer</option>
                                <option value="Other">Other City</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 4 -->
                    <div class="form-row-split">
                        <div class="form-group">
                            <label for="beds">No. of Beds*</label>
                            <select id="beds" name="No. of Beds" class="form-control" required>
                                <option value="" disabled selected>-- Select No. of Beds --</option>
                                <option value="1-10">1-10 Beds</option>
                                <option value="11-50">11-50 Beds</option>
                                <option value="51-200">51-200 Beds</option>
                                <option value="200+">200+ Beds</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="hospital">Hospital Name*</label>
                            <input type="text" id="hospital" name="Hospital Name" class="form-control" placeholder="Enter hospital/clinic name" required>
                        </div>
                    </div>

                    <!-- Row 5 -->
                    <div class="form-row-full">
                        <div class="form-group">
                            <label for="challenges">What challenges are you looking to solve?*</label>
                            <textarea id="challenges" name="Challenges" class="form-control" style="height: 120px;" placeholder="Describe your requirements or current pain points..." required></textarea>
                        </div>
                    </div>

                    <!-- Footer Checkbox -->
                    <div class="form-row-full">
                        <label class="privacy-check">
                            <input type="checkbox" required>
                            <span>I agree to Bharuwa Solutions' Privacy Policy and Terms & Conditions.</span>
                        </label>
                    </div>

                    <!-- Button -->
                    <div class="form-row-full">
                        <button type="submit" class="btn-submit" id="submit-btn">
                            Book a Demo
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div class="modal-overlay" id="success-modal">
        <div class="modal-content">
            <div class="check-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h2>Thank you!</h2>
            <p>Our team will connect with you soon.<br>Redirecting you to Home <span class="loading-dots"></span></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('book-demo-form');
        const modal = document.getElementById('success-modal');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI feedback
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Sending<span class="loading-dots"></span>';

            const formData = new FormData(form);
            const dataObj = Object.fromEntries(formData.entries());
            
            // In a production environment, uncomment the following block to use Formspree
            /*
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error('Submission failed');
            } catch (err) {
                console.error(err);
            }
            */

            // Display success modal immediately for best UX
            modal.style.display = 'flex';

            // Automatic 5-second redirect as requested
            setTimeout(() => {
                window.location.href = '/';
            }, 5000);
        });
    </script>
</body>
</html>
