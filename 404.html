<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Medical365</title>
  <link rel="icon" type="image/jpeg" href="medical365fav.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --brand-blue: #1D4E9E;
      --brand-teal: #37B39C;
      --bg-dark: #0B162C;
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background Effects matching the "Cortex" section */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(55, 179, 156, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
      background: rgba(11, 22, 44, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(55, 179, 156, 0.1);
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      margin-bottom: 30px;
    }

    .logo img {
      height: 40px;
      margin-right: 8px;
    }

    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 36px;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .text-blue {
      color: var(--brand-blue);
    }

    .text-teal {
      color: var(--brand-teal);
    }

    .error-code {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--brand-teal), var(--brand-blue), var(--brand-teal));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradient-shift 3s linear infinite, pulse-glow 2s ease-in-out infinite;
    }

    .error-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .error-message {
      font-size: 1.125rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-teal) 100%);
      color: #ffffff;
      border: none;
      box-shadow: 0 10px 20px rgba(55, 179, 156, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(55, 179, 156, 0.4);
    }

    .btn-outline {
      background: transparent;
      color: #ffffff;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
    }

    .btn-outline:hover {
      border-color: var(--brand-teal);
      color: var(--brand-teal);
      background: rgba(55, 179, 156, 0.05);
      transform: translateY(-2px);
    }

    /* Animations */
    @keyframes fade-in-up {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradient-shift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        text-shadow: 0 0 20px rgba(55, 179, 156, 0.2);
      }

      50% {
        text-shadow: 0 0 40px rgba(55, 179, 156, 0.5);
      }
    }

    /* Medical Cross Decor */
    .decor-cross {
      position: absolute;
      color: rgba(55, 179, 156, 0.1);
      z-index: 0;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-20px) rotate(10deg);
      }
    }
  </style>
</head>

<body>
  <svg class="decor-cross" style="top: 15%; left: 10%; width: 60px;" viewBox="0 0 24 24" fill="currentColor">
    <path d="M19 10.5h-5.5V5h-3v5.5H5v3h5.5V19h3v-5.5H19v-3z" />
  </svg>
  <svg class="decor-cross" style="bottom: 15%; right: 10%; width: 100px; animation-delay: -3s;" viewBox="0 0 24 24"
    fill="currentColor">
    <path d="M19 10.5h-5.5V5h-3v5.5H5v3h5.5V19h3v-5.5H19v-3z" />
  </svg>

  <main class="container">
    <a href="/" class="logo">
      <img src="medical365fav.jpg" alt="MEDICAL365 Icon" onerror="this.style.display='none'">
      <span class="logo-text"><span class="text-blue">MEDICAL</span><span class="text-teal">365</span></span>
    </a>

    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">
      Looks like this link flatlined. The page you are looking for might have been removed, had its name changed, or is
      temporarily unavailable.
    </p>

    <div class="btn-group">
      <a href="/" class="btn btn-primary">Return to Homepage</a>
      <a href="https://www.medical365.in/contact" class="btn btn-outline">Contact Support</a>
    </div>
  </main>
</body>

</html>
