    <style>
        :root {
            --primary: #1D4E9E;
            --secondary: #37B39C;
            --text-main: #0f172a;
            --text-muted: #475569;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent-glow: radial-gradient(circle, rgba(55, 179, 156, 0.15) 0%, transparent 70%);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif, Arial;
            background: #fdfefe;
            overflow-x: hidden;
            color: var(--text-main);
        }

        /* Atmospheric Background */
        .thank-you-view {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            position: relative;
            background: 
                radial-gradient(circle at 10% 10%, rgba(29, 78, 158, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(55, 179, 156, 0.05) 0%, transparent 30%);
        }

        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: var(--accent-glow);
            z-index: -1;
            filter: blur(100px);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.1); }
        }

        .thank-you-card {
            max-width: 640px;
            width: 100%;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 80px 60px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 40px 100px -20px rgba(15,23,42,0.1),
                0 0 0 1px rgba(255,255,255,0.8) inset;
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Premium Success Mark */
        .success-animation {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border-radius: 35px;
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            transform: rotate(-10deg);
            box-shadow: 0 20px 40px rgba(55, 179, 156, 0.3);
            animation: popIcon 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .success-animation svg { width: 50px; height: 50px; transform: rotate(10deg); }

        @keyframes popIcon {
            0% { transform: scale(0.5) rotate(0deg); opacity: 0; }
            100% { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        .thank-you-card h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .thank-you-card p {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Buttons Mapping the Pro UI */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .btn-action {
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
        }

        .btn-primary-action {
            background: var(--text-main);
            color: #fff;
            box-shadow: 0 10px 25px rgba(15,23,42,0.2);
        }

        .btn-primary-action:hover { transform: translateY(-4px); box-shadow: 0 20px 35px rgba(15,23,42,0.3); }

        .btn-secondary-action {
            background: #fff;
            color: #25D366;
            border: 1.5px solid #e2e8f0;
        }

        .btn-secondary-action:hover { border-color: #25D366; transform: translateY(-4px); }

        /* Auto-Redirect Bar */
        .redirect-wrapper {
            background: #f8fafc;
            padding: 12px 24px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .loader-ring {
            width: 18px;
            height: 18px;
            border: 2px solid #e2e8f0;
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .thank-you-card { padding: 48px 30px; }
            .thank-you-card h1 { font-size: 2.25rem; }
            .button-group { flex-direction: column; }
            .btn-action { justify-content: center; width: 100%; }
        }
    </style>

    <script>
        let counter = 6;
        const timerObj = document.getElementById('timer');
        const interval = setInterval(() => {
            counter--;
            timerObj.innerText = counter;
            if(counter <= 0) {
                clearInterval(interval);
                window.location.href = '/';
            }
        }, 1000);
    </script>
