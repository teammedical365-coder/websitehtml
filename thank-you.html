<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://medical365.in/thank-you" />
    <link rel="stylesheet" href="global-styles.css?v=4.0">
    <link rel="icon" type="image/jpeg" href="medical365fav.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Medical365</title>
    <meta name="robots" content="noindex, follow">
    <style>
        .thank-you-view {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px;
            background: radial-gradient(circle at top right, rgba(55, 179, 156, 0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(29, 78, 158, 0.05), transparent);
        }
        .thank-you-card {
            max-width: 600px;
            width: 100%;
            text-align: center;
            background: #fff;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(15,23,42,0.1);
            border: 1px solid rgba(55, 179, 156, 0.1);
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #37B39C 0%, #1D4E9E 100%);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 40px rgba(55, 179, 156, 0.3);
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .thank-you-card h1 {
            font-size: 3rem;
            color: #0f172a;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .thank-you-card p {
            font-size: 1.25rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        @media (max-width: 640px) {
            .thank-you-card h1 { font-size: 2.25rem; }
            .button-group { flex-direction: column; }
            .thank-you-card { padding: 40px 24px; border-radius: 30px; }
        }
    </style>
</head>
<body>
    <div class="mobile-overlay" id="mobile-overlay" aria-hidden="true"></div>

    <!-- The common header will be injected by global-scripts.js if needed, 
         but we'll include a simple one for reliability on this special page -->
    <header class="main-header" id="main-header" style="background: #fff; box-shadow: 0 1px 0 rgba(0,0,0,0.05);">
        <div class="header-container">
            <a style="display: flex; align-items: center; text-decoration: none;" href="/" class="logo">
                <img style="height: 30px;" src="medical365fav.jpg" alt="MEDICAL365">
                <span style="font-weight: 800; font-size: 24px; margin-left: 8px; color: #1D4E9E;">MEDICAL<span style="color: #37B39C;">365</span></span>
            </a>
        </div>
    </header>

    <main class="thank-you-view">
        <div class="thank-you-card reveal">
            <div class="success-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1>Thank You!</h1>
            <p>Your message has been successfully received at <strong>TEAMMEDICAL365@GMAIL.COM</strong>. One of our specialists will contact you within 24 hours.</p>
            <div class="button-group">
                <a href="/" class="btn-primary" style="padding: 16px 32px; border-radius: 16px;">Back to Home</a>
                <a href="https://wa.me/917791910007" class="btn-outline" style="padding: 16px 32px; border-radius: 16px; border: 1px solid #e2e8f0; display: inline-flex; align-items: center; gap: 8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    WhatsApp Us
                </a>
            </div>
        </div>
    </main>

    <script src="global-scripts.js?v=4.0"></script>
    <script>
        // Ensure header stays synced
        document.addEventListener('DOMContentLoaded', function() {
            const h = document.getElementById('main-header');
            if (h) document.body.style.paddingTop = h.offsetHeight + 'px';
        });
    </script>
</body>
</html>
